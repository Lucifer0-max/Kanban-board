<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">
                <h2>Kanban</h2>
            </div>
            <div class="right">
                <button id="toggle-modal"class="btn">Add new task</button>
            </div>
        </nav>

        <section class="board">
            <div id="todo" class="task-box">
                <div class="heading">
                    <div class="left">Todo</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="progress" class="task-box ">
                <div class="heading">
                    <div class="left">Progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="done" class="task-box">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal add-new-task">
        <div class="bg"></div>
        <div class="center">
            <input 
            id="task-title-input" 
            type="text" 
            placeholder="Task Title"
            >
            <textarea 
            id="task-des-input" 
            placeholder="Task Discription">
            </textarea>
            <button id="add-new-task" class="add-task-btn">Add Task</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
